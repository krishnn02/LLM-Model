services:
  - type: web
    name: omnifood-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python -m playwright install --with-deps chromium"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: HEADLESS
        value: "true"
      - key: CORS_ORIGINS
        value: "*" # Allow all origins for the frontend to connect

  - type: web
    name: omnifood-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_WS_URL
        # We will leave this sync: false so the user can set it to wss://<backend-url>/ws/agent in the Render dashboard after the backend deploys
        sync: false
